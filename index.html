<!DOCTYPE html>
<html>
<head>
    <title>أطلس الخرائط..</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f4f9; }
        .container { text-align: center; padding: 20px; border-radius: 10px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div id="status">جاري محاولة فتح تطبيق أطلس الخرائط...</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const data = urlParams.get('d');
        
        if (data) {
            const appUrl = "khipresh://share?d=" + data;
            // const downloadUrl = "https://www.theatlas.com/download"; 

            const onVisibilityChange = () => {
                if (document.hidden) {
                    console.log("🚀 التطبيق بدأ يفتح أو رسالة التأكيد ظهرت..");
                    
                    // استنى ثانية عشان نضمن إن الويندوز استلم الأمر بالكامل
                    setTimeout(() => {
                        window.open('', '_self', ''); // خدعة للسماح بالقفل
                        window.close();
                        
                        // رسالة احتياطية لو المتصفح رفض القفل التلقائي
                        document.getElementById('status').innerHTML = "✅ تم توجيهك للأطلس. يمكنك إغلاق الصفحة.";
                    }, 1000);
                }
            };

            // إضافة المستمع
            document.addEventListener("visibilitychange", onVisibilityChange);
            // محاولة الفتح الفوري
            window.location.href = appUrl;

           // أمان إضافي: لو المستخدم فضل في الصفحة ثانيتين ومحصلش تغيير، 
            // معناها التطبيق مش عنده أو رفض الفتح
            setTimeout(() => {
                if (!document.hidden) {
                    document.getElementById('status').innerHTML = "⚠️ يبدو أن التطبيق غير مثبت، أو لم يتم إعطاء الإذن.";
                }
            }, 2000);
            
            // إذا لم يفتح التطبيق خلال ٣ ثواني، حوله للتحميل
            // setTimeout(function() {
            //     if (!document.hidden) {
            //         document.getElementById('status').innerHTML = "يبدو أن التطبيق غير مثبت.<br><br>جاري تحويلك لصفحة التحميل...";
            //         window.location.href = downloadUrl;
            //     }
            // }, 3000);
        } else {
            document.getElementById('status').innerHTML = "رابط غير صالح أو بيانات مفقودة.";
        }
    </script>
</body>
</html>
