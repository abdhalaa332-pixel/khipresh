<!DOCTYPE html>
<html>
<head>
    <title>أطلس الخرائط..</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f4f9; }
        .container { text-align: center; padding: 20px; border-radius: 10px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div id="status">جاري محاولة فتح تطبيق أطلس الخرائط...</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const data = urlParams.get('d');
        
        if (data) {
            const appUrl = "khipresh://share?d=" + data;
            // const downloadUrl = "https://www.theatlas.com/download"; 

            const closeWindow = () => {
                // خدعة 1: إيهام المتصفح أن الصفحة مفتوحة برمجياً
                window.open('', '_self', ''); 
                window.close();

                // خدعة 2: لمحركات المتصفحات القديمة وبعض نسخ Chrome
                setTimeout(() => {
                    // لو مقفلتش، حولها لصفحة فارغة تماماً عشان ما تشتتش المستخدم
                    document.body.innerHTML = `
                        <div style="display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">
                            <p style="color:#666;">🚀 تم فتح التطبيق.. يمكنك إغلاق هذه النافذة الآن.</p>
                        </div>
                    `;
                    // محاولة أخيرة للقفل بعد تحويل المحتوى
                    window.close();
                }, 500);
            };

            // مراقبة فقدان التركيز (لما المستخدم يدوس Allow)
            document.addEventListener("visibilitychange", () => {
                if (document.hidden) {
                    // المستخدم وافق والتطبيق بدأ يفتح
                    setTimeout(closeWindow, 1000);
                }
            });
            // محاولة الفتح الفوري
            window.location.href = appUrl;

           // خدعة 3: لو المستخدم ضغط في أي مكان في الصفحة (Interaction)
            // المتصفح بيدينا صلاحية القفل لو فيه User Gesture
            document.body.onclick = () => {
                closeWindow();
            };
            
            // إذا لم يفتح التطبيق خلال ٣ ثواني، حوله للتحميل
            // setTimeout(function() {
            //     if (!document.hidden) {
            //         document.getElementById('status').innerHTML = "يبدو أن التطبيق غير مثبت.<br><br>جاري تحويلك لصفحة التحميل...";
            //         window.location.href = downloadUrl;
            //     }
            // }, 3000);
        } else {
            document.getElementById('status').innerHTML = "رابط غير صالح أو بيانات مفقودة.";
        }
    </script>
</body>
</html>
